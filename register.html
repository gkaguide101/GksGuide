<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ثبت نام</title>

<link rel="stylesheet" href="auth.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>


<div class="auth-box">

    <h1>ثبت نام</h1>
    <p class="auth-subtitle">حساب کاربری خود را بسازید</p>


    <div class="input-group">
        <i class="fas fa-user"></i>
        <input id="name" type="text" placeholder="نام و نام خانوادگی">
    </div>


    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input id="email" type="email" placeholder="ایمیل">
    </div>


    <div class="input-group">
        <i class="fas fa-phone"></i>
        <input id="phone" type="text" placeholder="شماره موبایل">
    </div>


    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input id="password" type="password" placeholder="رمز عبور">
    </div>


    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input id="password2" type="password" placeholder="تکرار رمز عبور">
    </div>


    <button id="signup">ایجاد حساب</button>


    <p>حساب دارید؟ <a href="login-email.html">ورود</a></p>


</div>


<a href="https://t.me/kgsp_iran" target="_blank" class="float-telegram">
<i class="fab fa-telegram"></i>
</a>



<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";


import { getAuth, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";



const firebaseConfig = {

apiKey: "AIzaSyDQmdz3v9qFMiRmq9ftdx5AG684QKjWeHQ",

authDomain: "gksguide1-e7464.firebaseapp.com",
projectId: "gksguide1-e7464",

storageBucket: "gksguide1-e7464.firebasestorage.app",

messagingSenderId: "935501118637",

appId: "1:935501118637:web:bad899f43f835d2e1c9a24"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



document.getElementById("signup").onclick = () => {


let email = document.getElementById("email").value;

let password = document.getElementById("password").value;

let password2 = document.getElementById("password2").value;



if(password !== password2){

alert("رمز عبور یکسان نیست");

return;

}



createUserWithEmailAndPassword(auth,email,password)


.then((userCredential)=>{

alert("ثبت نام موفق بود");

console.log(userCredential.user);


})


.catch((error)=>{

alert(error.message);


});


};



</script>


</body>
</html>
